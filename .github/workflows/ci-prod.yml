name: CI - Production

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js and tools
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install linters and Parcel
        run: |
          npm install -g htmlhint stylelint parcel
      - name: Lint HTML files
        run: htmlhint *.html
      - name: Lint CSS file
        run: stylelint style.css
      - name: Build with Parcel
        run: parcel build *.html --dist-dir dist --public-url ./

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:prod
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:prod-${{ github.sha }}