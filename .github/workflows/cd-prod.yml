name: CD - Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to Render (Production)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST ${{ secrets.RENDER_PRODUCTION }}
          echo "Deployment to Production triggered at $(date)"