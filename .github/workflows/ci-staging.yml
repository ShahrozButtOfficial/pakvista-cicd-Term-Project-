name: CI - Staging

on:
  pull_request:
    branches: [ staging ]

jobs:
  build-and-push:
    name: Build, Lint & Push Staging Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linters & Parcel
        run: |
          npm install -g htmlhint stylelint parcel

      - name: Lint HTML & CSS
        run: |
          htmlhint *.html
          stylelint style.css

      - name: Build with Parcel (Validation)
        run: |
          parcel build *.html --dist-dir dist --public-url ./

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Staging Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-${{ github.sha }}